apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "shop-console.fullname" . }}-api
  labels:
    {{- include "shop-console.apiLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "shop-console.apiLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "shop-console.apiLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsUser: {{ .Values.securityContext.runAsUser }}
        runAsGroup: {{ .Values.securityContext.runAsGroup }}
        fsGroup: {{ .Values.securityContext.fsGroup }}
      initContainers:
        - name: wait-datastores
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "shop-console.mongoServiceName" . }} 27017; do sleep 2; done
              until nc -z {{ include "shop-console.postgresServiceName" . }} 5432; do sleep 2; done
      containers:
        - name: api
          image: {{ .Values.image.api.repository }}:{{ .Values.image.api.tag }}
          imagePullPolicy: {{ .Values.image.api.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
          envFrom: []
          env:
            - name: MONGO_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "shop-console.fullname" . }}-secrets
                  key: MONGO_URL
            - name: MONGO_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "shop-console.fullname" . }}-secrets
                  key: MONGO_DB_NAME
            - name: POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "shop-console.fullname" . }}-secrets
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ include "shop-console.fullname" . }}-secrets
                  key: POSTGRES_PORT
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ include "shop-console.fullname" . }}-secrets
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "shop-console.fullname" . }}-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "shop-console.fullname" . }}-secrets
                  key: POSTGRES_PASSWORD
            - name: UVICORN_WORKERS
              value: "{{ .Values.uvicorn.workers }}"
            - name: AUTH_REALM
              valueFrom:
                secretKeyRef:
                  name: {{ include "shop-console.fullname" . }}-secrets
                  key: AUTH_REALM
            - name: AUTH_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "shop-console.fullname" . }}-secrets
                  key: AUTH_ADMIN_USERNAME
            - name: AUTH_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "shop-console.fullname" . }}-secrets
                  key: AUTH_ADMIN_PASSWORD
            - name: AUTH_MANAGER_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "shop-console.fullname" . }}-secrets
                  key: AUTH_MANAGER_USERNAME
            - name: AUTH_MANAGER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "shop-console.fullname" . }}-secrets
                  key: AUTH_MANAGER_PASSWORD
            - name: AUTH_USER_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "shop-console.fullname" . }}-secrets
                  key: AUTH_USER_USERNAME
            - name: AUTH_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "shop-console.fullname" . }}-secrets
                  key: AUTH_USER_PASSWORD
            - name: AUTH_GUEST_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "shop-console.fullname" . }}-secrets
                  key: AUTH_GUEST_USERNAME
            - name: AUTH_GUEST_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "shop-console.fullname" . }}-secrets
                  key: AUTH_GUEST_PASSWORD
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 6
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: {{ .Values.securityContext.readOnlyRootFilesystem }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}


apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "shop-console.mongoServiceName" . }}
  labels:
    {{- include "shop-console.mongoLabels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "shop-console.mongoLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "shop-console.mongoLabels" . | nindent 8 }}
    spec:
      containers:
        - name: mongodb
          image: {{ .Values.mongo.image }}
          ports:
            - name: mongodb
              containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "shop-console.fullname" . }}-secrets
                  key: MONGO_INITDB_ROOT_USERNAME
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "shop-console.fullname" . }}-secrets
                  key: MONGO_INITDB_ROOT_PASSWORD
            - name: MONGO_INITDB_DATABASE
              value: {{ .Values.mongo.dbName | quote }}
          volumeMounts:
            - name: mongo-init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
            - name: data
              mountPath: /data/db
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - >-
                  mongosh "mongodb://$MONGO_INITDB_ROOT_USERNAME:$MONGO_INITDB_ROOT_PASSWORD@127.0.0.1:27017/admin"
                  --quiet --eval "db.adminCommand('ping').ok" | grep -q 1
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - >-
                  mongosh "mongodb://$MONGO_INITDB_ROOT_USERNAME:$MONGO_INITDB_ROOT_PASSWORD@127.0.0.1:27017/admin"
                  --quiet --eval "db.adminCommand('ping').ok" | grep -q 1
            initialDelaySeconds: 45
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            {{- toYaml .Values.mongo.resources | nindent 12 }}
      volumes:
        - name: mongo-init
          configMap:
            name: {{ include "shop-console.fullname" . }}-mongo-init
        - name: data
          {{- if .Values.mongo.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "shop-console.mongoServiceName" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "shop-console.postgresServiceName" . }}
  labels:
    {{- include "shop-console.postgresLabels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "shop-console.postgresLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "shop-console.postgresLabels" . | nindent 8 }}
    spec:
      containers:
        - name: postgresql
          image: {{ .Values.postgres.image }}
          ports:
            - name: postgresql
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ include "shop-console.fullname" . }}-secrets
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "shop-console.fullname" . }}-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "shop-console.fullname" . }}-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 10
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
      volumes:
        - name: postgres-init
          configMap:
            name: {{ include "shop-console.fullname" . }}-postgres-init
        - name: data
          {{- if .Values.postgres.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "shop-console.postgresServiceName" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}

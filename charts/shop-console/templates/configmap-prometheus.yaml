{{- if .Values.monitoring.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "shop-console.fullname" . }}-prometheus
  labels:
    app.kubernetes.io/name: {{ include "shop-console.name" . }}
    app.kubernetes.io/component: prometheus
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  prometheus.yml: |-
    global:
      scrape_interval: 10s

    scrape_configs:
      - job_name: api
        metrics_path: /metrics
        scheme: http
        static_configs:
          - targets:
              - {{ include "shop-console.fullname" . }}-api:{{ .Values.api.service.targetPort }}
{{- end }}


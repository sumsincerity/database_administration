{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "shop-console.fullname" . }}-api-egress
spec:
  podSelector:
    matchLabels:
      {{- include "shop-console.apiLabels" . | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    # DNS (required for service discovery)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # MongoDB
    - to:
        - podSelector:
            matchLabels:
              {{- include "shop-console.mongoLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 27017
    # PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              {{- include "shop-console.postgresLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5432
{{- end }}


name: Python CI/CD

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  ci-cd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Установка зависимостей
        run: |
          python -m pip install --upgrade pip
          # Вариант 1: если есть pyproject.toml / setup.py
          pip install -e ".[dev]"
          # Вариант 2: если используете requirements.txt
          # pip install -r requirements.txt
          pip install pytest ruff build

      - name: Линтинг (Ruff)
        run: ruff check .

      - name: Тесты
        run: pytest -v

      - name: Сборка пакета
        run: python -m build

      - name: Публикация в GitHub Releases
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
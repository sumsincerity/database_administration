# MongoDB: шардирование + репликация (каждая реплика — отдельный контейнер)
services:
  mongo-cfg-0:
    image: mongo:7
    command: ["mongod", "--configsvr", "--replSet", "cfgRS", "--bind_ip_all", "--port", "27017"]
    volumes:
      - mongo_cfg_0:/data/db
    networks: [shop-net]
    restart: unless-stopped

  mongo-cfg-1:
    image: mongo:7
    command: ["mongod", "--configsvr", "--replSet", "cfgRS", "--bind_ip_all", "--port", "27017"]
    volumes:
      - mongo_cfg_1:/data/db
    networks: [shop-net]
    restart: unless-stopped

  mongo-cfg-2:
    image: mongo:7
    command: ["mongod", "--configsvr", "--replSet", "cfgRS", "--bind_ip_all", "--port", "27017"]
    volumes:
      - mongo_cfg_2:/data/db
    networks: [shop-net]
    restart: unless-stopped

  mongo-shard1-0:
    image: mongo:7
    command: ["mongod", "--shardsvr", "--replSet", "shard1RS", "--bind_ip_all", "--port", "27017"]
    volumes:
      - mongo_shard1_0:/data/db
    networks: [shop-net]
    restart: unless-stopped

  mongo-shard1-1:
    image: mongo:7
    command: ["mongod", "--shardsvr", "--replSet", "shard1RS", "--bind_ip_all", "--port", "27017"]
    volumes:
      - mongo_shard1_1:/data/db
    networks: [shop-net]
    restart: unless-stopped

  mongo-shard1-2:
    image: mongo:7
    command: ["mongod", "--shardsvr", "--replSet", "shard1RS", "--bind_ip_all", "--port", "27017"]
    volumes:
      - mongo_shard1_2:/data/db
    networks: [shop-net]
    restart: unless-stopped

  mongo-shard2-0:
    image: mongo:7
    command: ["mongod", "--shardsvr", "--replSet", "shard2RS", "--bind_ip_all", "--port", "27017"]
    volumes:
      - mongo_shard2_0:/data/db
    networks: [shop-net]
    restart: unless-stopped

  mongo-shard2-1:
    image: mongo:7
    command: ["mongod", "--shardsvr", "--replSet", "shard2RS", "--bind_ip_all", "--port", "27017"]
    volumes:
      - mongo_shard2_1:/data/db
    networks: [shop-net]
    restart: unless-stopped

  mongo-shard2-2:
    image: mongo:7
    command: ["mongod", "--shardsvr", "--replSet", "shard2RS", "--bind_ip_all", "--port", "27017"]
    volumes:
      - mongo_shard2_2:/data/db
    networks: [shop-net]
    restart: unless-stopped

  mongos:
    image: mongo:7
    command:
      - mongos
      - --configdb
      - cfgRS/mongo-cfg-0:27017,mongo-cfg-1:27017,mongo-cfg-2:27017
      - --bind_ip_all
      - --port
      - "27017"
    ports:
      # 27018 на хосте — чтобы не конфликтовать с локальным MongoDB на :27017
      - "27018:27017"
    depends_on:
      - mongo-cfg-0
      - mongo-cfg-1
      - mongo-cfg-2
      - mongo-shard1-0
      - mongo-shard1-1
      - mongo-shard1-2
      - mongo-shard2-0
      - mongo-shard2-1
      - mongo-shard2-2
    networks: [shop-net]
    restart: unless-stopped

  mongo-cluster-init:
    image: mongo:7
    env_file:
      - .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - ./docker/mongo/scripts/init-sharded-cluster.sh:/setup/init-sharded-cluster.sh:ro
      - ./charts/shop-console/files/mongo/01-init-shop.js:/docker-entrypoint-initdb.d/01-init-shop.js:ro
      - mongo_init_state:/tmp
    entrypoint: ["/bin/bash", "/setup/init-sharded-cluster.sh"]
    depends_on:
      - mongos
      - mongo-cfg-0
      - mongo-cfg-1
      - mongo-cfg-2
      - mongo-shard1-0
      - mongo-shard1-1
      - mongo-shard1-2
      - mongo-shard2-0
      - mongo-shard2-1
      - mongo-shard2-2
    networks: [shop-net]
    restart: "no"

volumes:
  mongo_cfg_0:
  mongo_cfg_1:
  mongo_cfg_2:
  mongo_shard1_0:
  mongo_shard1_1:
  mongo_shard1_2:
  mongo_shard2_0:
  mongo_shard2_1:
  mongo_shard2_2:
  mongo_init_state:

networks:
  shop-net:
    name: shop-net
